      <stop offset="0.35" stop-color="#A7F3D0"></stop>
      <stop offset="0.75" stop-color="#34D399"></stop>
      <stop offset="1" stop-color="#065F46"></stop>
    </radialGradient>
    <radialGradient id="leafHL" cx="0.3" cy="0.3" r="0.4">
      <stop offset="0" stop-color="white" stop-opacity="0.85"></stop>
      <stop offset="1" stop-color="white" stop-opacity="0"></stop>
    </radialGradient>
  </defs>

  
  <rect width="1024" height="1024" rx="232" fill="url(#bg)"></rect>
  <rect width="1024" height="1024" rx="232" fill="url(#bgSheen)"></rect>

  
  <g opacity="0.13" fill="white">
