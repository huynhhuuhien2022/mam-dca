<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22C55E"></stop>
      <stop offset="0.5" stop-color="#16A34A"></stop>
      <stop offset="1" stop-color="#14532D"></stop>
    </linearGradient>
    <radialGradient id="bgSheen" cx="0.3" cy="0.15" r="0.7">
      <stop offset="0" stop-color="white" stop-opacity="0.3"></stop>
      <stop offset="1" stop-color="white" stop-opacity="0"></stop>
    </radialGradient>

    <radialGradient id="leaf" cx="0.3" cy="0.2" r="0.95">
